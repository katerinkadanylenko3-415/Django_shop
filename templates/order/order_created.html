{% extends "base.html" %}
{% block main %}
<div class="container mt-5">
    <h2 class="mb-4">Дякуємо за замовлення!</h2>
    <p>Номер замовлення: <strong>{{ order.order_number }}</strong></p>
    <p>Дата створення: {{ order.created|date:"d.m.Y H:i" }}</p>
    <p>Статус: {{ order.get_status_display }}</p>
    <a href="{% url 'home' %}" class="btn btn-primary">На головну</a>
</div>
{% endblock %}
